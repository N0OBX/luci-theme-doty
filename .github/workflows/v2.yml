name: release-packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag, defaults to v<PKG_VERSION>-r<PKG_RELEASE>"
        required: true
        type: string

jobs:
  prepare-release:
    name: prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: resolve tag
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            version="$(awk -F':=' '/^PKG_VERSION:=/{print $2}' Makefile | tr -d '[:space:]')"
            release="$(awk -F':=' '/^PKG_RELEASE:=/{print $2}' Makefile | tr -d '[:space:]')"
            tag="v${version}-r${release}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
          else
            gh release create "$tag" \
              --title "Release $tag" \
              --generate-notes
          fi

  build-and-upload:
    name: ${{ matrix.branch }}
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
        branch:
          - openwrt-25.12
          - openwrt-24.10
          - SNAPSHOT
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          path: ${{ github.event.repository.name }}

      - name: build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          PACKAGES: ${{ github.event.repository.name }}
          NO_REFRESH_CHECK: true
          V: s

      - name: prepare release assets
        shell: bash
        run: |
          shopt -s nullglob
          mkdir -p release-assets
          files=(bin/packages/${{ matrix.arch }}/action/*.ipk bin/packages/${{ matrix.arch }}/action/*.apk)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No packages were produced" >&2
            exit 1
          fi
          for file in "${files[@]}"; do
            name="$(basename "$file")"
            cp "$file" "release-assets/${{ matrix.branch }}-$name"
          done
          printf '%s\n' release-assets/*

      - name: upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh release upload "${{ needs.prepare-release.outputs.tag }}" release-assets/* --clobber
